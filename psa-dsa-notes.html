<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Study Portal | SDET & Dev Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #ffffff;
            --sidebar-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #e1e3e2;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 80;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .nav-list {
            flex: 1;
            padding: 1.5rem 1rem;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-dim);
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--glass);
            color: var(--text-main);
        }

        .nav-item.active {
            background: rgba(114, 115, 144, 0.15);
            color: var(--primary);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 1.2rem;
            width: 10px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Main Content Styling */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .portal-header {
            height: 70px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 90;
        }

        .current-view {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .view-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--glass);
            border: 1px solid var(--border);
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Loader */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
            pointer-events: none;
            opacity: 0;
        }

        .loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .menu-toggle {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
        }

        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
            }
            .sidebar.open {
                transform: translateX(280px);
            }
            .menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">S</div>
                Study Hub
            </div>
        </div>
        <ul class="nav-list">
            <li class="nav-item active" onclick="loadContent('./MERN/java_coding.html', 'Java Coding Hub', this)">
                <i>☕</i> Java Coding
            </li>
            <li class="nav-item" onclick="loadContent('./MERN/java_dsa.html', 'DSA Master Notes', this)">
                <i>📊</i> Java DSA
            </li>
            <li class="nav-item" onclick="loadContent('./MERN/java_streams_study_hub.html', 'Streams API Hub', this)">
                <i>⚡</i> Java Streams
            </li>
            <li class="nav-item" onclick="loadContent('./MERN/javascript.html', 'JavaScript Guide', this)">
                <i>JS</i> JavaScript
            </li>
        </ul>
        <div class="sidebar-footer">
            <p>© 2026 Master Study Portal</p>
            <p style="margin-top: 5px; font-size: 0.75rem;">Consolidated Knowledge Base</p>
        </div>
    </aside>

    <main class="main-container">
        <header class="portal-header">
            <div class="current-view">
                <span class="menu-toggle" onclick="toggleSidebar()">☰</span>
                <span class="view-title" id="viewTitle">Java Coding Hub</span>
                <span class="badge">Local Asset</span>
            </div>
        </header>

        <div class="iframe-container">
            <div id="loader" class="loader-overlay">
                <div class="spinner"></div>
            </div>
            <iframe id="contentFrame" src="java_coding.html" title="Study Content"></iframe>
        </div>
    </main>

    <script>
        const frame = document.getElementById('contentFrame');
        const loader = document.getElementById('loader');
        const viewTitle = document.getElementById('viewTitle');
        const sidebar = document.getElementById('sidebar');

        function loadContent(url, title, element) {
            loader.classList.add('active');
            viewTitle.textContent = title;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            frame.src = url;
            if (window.innerWidth <= 1024) {
                toggleSidebar();
            }
        }

        frame.onload = function() {
            setTimeout(() => {
                loader.classList.remove('active');
            }, 500);
        };

        function toggleSidebar() {
            sidebar.classList.toggle('open');
        }
    </script>
</body>
</html>
