<script>
const done = new Set();
let currentSection = 'home';
let currentFilter = 'all';

const sections = {
  strings: {
    title: "List of Strings — Streams",
    desc: "Master string manipulation using Java Streams API. From basic transformations to complex grouping operations.",
    tags: ["filter()", "map()", "collect()", "groupingBy()", "sorted()"],
    questions: [
      { id: 'S1', level: 'basic', title: 'Convert list of strings to uppercase, sort and print', ops: ['map()', 'sorted()', 'forEach()'],
        explanation: "Use map() to transform each string to uppercase, sorted() to sort alphabetically, then forEach() to print.",
        code: `List<String> names = Arrays.asList("banana","apple","cherry","date");

names.stream()
     .map(<span class="cl">String</span>::toUpperCase)     <span class="cm">// transform each string</span>
     .sorted()                          <span class="cm">// sort alphabetically</span>
     .forEach(<span class="cl">System</span>.out::println);   <span class="cm">// print each</span>

<span class="cm">// Output: APPLE, BANANA, CHERRY, DATE</span>`},

      { id: 'S2', level: 'basic', title: 'Get strings where length > 5 and count them', ops: ['filter()', 'count()'],
        explanation: "Use filter() to keep only strings with length > 5, then count() to get the total.",
        code: `List<String> words = Arrays.asList("hi","hello","stream","go","java","filter");

<span class="kw">long</span> count = words.stream()
    .filter(s -> s.length() > <span class="num">5</span>)   <span class="cm">// keep only length > 5</span>
    .count();                        <span class="cm">// terminal: count elements</span>

<span class="cl">System</span>.out.println(count);         <span class="cm">// Output: 2 (stream, filter)</span>`},

      { id: 'S3', level: 'basic', title: 'Remove duplicates from a list', ops: ['distinct()'],
        explanation: "distinct() is a stateful intermediate operation that eliminates duplicate elements.",
        code: `List<String> list = Arrays.asList("apple","banana","apple","cherry","banana");

List<String> unique = list.stream()
    .distinct()             <span class="cm">// remove duplicates</span>
    .collect(<span class="cl">Collectors</span>.toList());

<span class="cm">// Output: [apple, banana, cherry]</span>`},

      { id: 'S4', level: 'basic', title: 'Get strings containing a particular word', ops: ['filter()', 'contains()'],
        explanation: "filter() with String.contains() filters strings that include a specific substring.",
        code: `List<String> sentences = Arrays.asList(
    "Java streams are powerful",
    "Python is great",
    "Java is widely used",
    "Kotlin and Java"
);

List<String> result = sentences.stream()
    .filter(s -> s.contains(<span class="str">"Java"</span>))
    .collect(<span class="cl">Collectors</span>.toList());

<span class="cm">// Output: [Java streams are powerful, Java is widely used, Kotlin and Java]</span>`},

      { id: 'S5', level: 'basic', title: 'Remove strings that start with a specific word', ops: ['filter()', 'startsWith()'],
        explanation: "Use filter() with negate (!) to exclude strings starting with a particular prefix.",
        code: `List<String> fruits = Arrays.asList("apple","apricot","banana","avocado","cherry");

List<String> result = fruits.stream()
    .filter(s -> !s.startsWith(<span class="str">"ap"</span>))   <span class="cm">// exclude strings starting with "ap"</span>
    .collect(<span class="cl">Collectors</span>.toList());

<span class="cm">// Output: [banana, avocado, cherry]</span>`},

      { id: 'S6', level: 'basic', title: 'Find the first element starting with a particular letter', ops: ['filter()', 'findFirst()'],
        explanation: "filter() to match the letter, findFirst() returns an Optional with the first match.",
        code: `List<String> names = Arrays.asList("Charlie","Alice","Bob","Andrew");

<span class="cl">Optional</span><String> first = names.stream()
    .filter(s -> s.startsWith(<span class="str">"A"</span>))
    .findFirst();

first.ifPresent(<span class="cl">System</span>.out::println);   <span class="cm">// Output: Alice</span>`},

      { id: 'S7', level: 'basic', title: 'Get the length of each name in a list', ops: ['map()', 'collect()'],
        explanation: "map() transforms each string to its length using String::length method reference.",
        code: `List<String> names = Arrays.asList("Alice","Bob","Charlie","Dave");

List<Integer> lengths = names.stream()
    .map(<span class="cl">String</span>::length)             <span class="cm">// transform to length</span>
    .collect(<span class="cl">Collectors</span>.toList());

<span class="cm">// Output: [5, 3, 7, 4]</span>

<span class="cm">// Print name + length together:</span>
names.stream()
     .forEach(n -> <span class="cl">System</span>.out.println(n + <span class="str">" -> "</span> + n.length()));</span>`},

      { id: 'S8', level: 'intermediate', title: 'Sort strings by their lengths (ascending/descending)', ops: ['sorted()', 'Comparator'],
        explanation: "Use sorted() with a custom Comparator comparing string lengths. Reverse with reversed().",
        code: `List<String> words = Arrays.asList("banana","kiwi","apple","fig","mango");

<span class="cm">// Ascending by length:</span>
words.stream()
     .sorted(<span class="cl">Comparator</span>.comparingInt(<span class="cl">String</span>::length))
     .forEach(<span class="cl">System</span>.out::println);

<span class="cm">// Descending by length:</span>
words.stream()
     .sorted(<span class="cl">Comparator</span>.comparingInt(<span class="cl">String</span>::length).reversed())
     .forEach(<span class="cl">System</span>.out::println);

<span class="cm">// Ascending: fig, kiwi, mango, apple, banana</span>`},

      { id: 'S9', level: 'intermediate', title: 'Find the longest word in the list', ops: ['reduce()', 'max()'],
        explanation: "Use max() with a Comparator on string lengths, or reduce() to compare two strings at a time.",
        code: `List<String> words = Arrays.asList("apple","extraordinary","kiwi","mango","stream");

<span class="cm">// Using max():</span>
<span class="cl">Optional</span><String> longest = words.stream()
    .max(<span class="cl">Comparator</span>.comparingInt(<span class="cl">String</span>::length));

longest.ifPresent(<span class="cl">System</span>.out::println);   <span class="cm">// extraordinary</span>

<span class="cm">// Using reduce():</span>
<span class="cl">Optional</span><String> longest2 = words.stream()
    .reduce((a, b) -> a.length() >= b.length() ? a : b);`},

      { id: 'S10', level: 'intermediate', title: 'Get strings containing vowels', ops: ['filter()', 'matches()'],
        explanation: "Use filter() with a regex that checks whether the string contains at least one vowel.",
        code: `List<String> words = Arrays.asList("stream","cry","apple","gym","rhythm","orange");

List<String> withVowels = words.stream()
    .filter(s -> s.matches(<span class="str">".*[aeiouAEIOU].*"</span>))
    .collect(<span class="cl">Collectors</span>.toList());

<span class="cm">// Output: [stream, apple, orange]</span>`},

      { id: 'S11', level: 'intermediate', title: 'Convert list of strings to single comma-separated string', ops: ['joining()'],
        explanation: "Collectors.joining() is a powerful collector that concatenates strings with a delimiter.",
        code: `List<String> fruits = Arrays.asList("apple","banana","cherry","date");

String result = fruits.stream()
    .collect(<span class="cl">Collectors</span>.joining(<span class="str">", "</span>));

<span class="cl">System</span>.out.println(result);
<span class="cm">// Output: apple, banana, cherry, date</span>

<span class="cm">// With prefix and suffix:</span>
String withBrackets = fruits.stream()
    .collect(<span class="cl">Collectors</span>.joining(<span class="str">", "</span>, <span class="str">"["</span>, <span class="str">"]"</span>));
<span class="cm">// Output: [apple, banana, cherry, date]</span>`},

const doneCounts = { strings: 0, numbers: 0, employees: 0 };

function updateProgress() {
  const total = 55;
  const count = done.size;
  document.getElementById('progressText').textContent = count + ' / ' + total;
  document.getElementById('progressFill').style.width = (count / total * 100) + '%';

  ['strings','numbers','employees'].forEach(sec => {
    const qs = sections[sec].questions;
    doneCounts[sec] = qs.filter(q => done.has(q.id)).length;
  });

  document.querySelectorAll('.stat-card[data-section]').forEach(card => {
    const sec = card.dataset.section;
    if (sec) {
      const qs = sections[sec].questions;
      card.querySelector('.stat-num').textContent = doneCounts[sec] + '/' + qs.length;
    }
  });
}

function toggleQuestion(id) {
  const body = document.getElementById('body-' + id);
  const toggle = document.getElementById('toggle-' + id);
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.q-body.open').forEach(b => {
    b.classList.remove('open');
    const t = document.getElementById('toggle-' + b.id.replace('body-',''));
    if (t) t.classList.remove('open');
  });
  if (!isOpen) {
    body.classList.add('open');
    toggle.classList.add('open');
  }
}

function markDone(id) {
  const btn = document.getElementById('done-btn-' + id);
  const numEl = document.getElementById('num-' + id);
  const card = document.getElementById('card-' + id);
  if (done.has(id)) {
    done.delete(id);
    btn.classList.remove('done');
    btn.innerHTML = '&#9711; Mark as studied';
    numEl.classList.remove('done');
    card.classList.remove('done');
  } else {
    done.add(id);
    btn.classList.add('done');
    btn.innerHTML = '&#10003; Studied!';
    numEl.classList.add('done');
    card.classList.add('done');
  }
  updateProgress();
}

function copyCode(id) {
  const el = document.getElementById('code-' + id);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-' + id);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { showSection(currentSection); return; }

  const results = [];
  ['strings','numbers','employees'].forEach(sec => {
    sections[sec].questions.forEach(question => {
      if (question.title.toLowerCase().includes(q) || question.ops.some(o => o.toLowerCase().includes(q))) {
        results.push({ ...question, section: sec });
      }
    });
  });

  const main = document.getElementById('mainContent');
  if (results.length === 0) {
    main.innerHTML = '<div class="empty-state">No questions found for "' + q + '"</div>';
    return;
  }

  main.innerHTML = '<div style="margin-bottom:1.5rem;"><span style="font-size:13px;color:var(--muted);">Showing ' + results.length + ' results for "' + q + '"</span></div>' +
    '<div class="questions-grid">' + results.map(q => renderQuestion(q)).join('') + '</div>';
}

function renderQuestion(q) {
  const levelClass = { basic: 'badge-basic', intermediate: 'badge-intermediate', advanced: 'badge-advanced' }[q.level];
  const levelLabel = { basic: 'Basic', intermediate: 'Intermediate', advanced: 'Advanced' }[q.level];
  const isDone = done.has(q.id);
  return `<div class="q-card ${isDone ? 'done' : ''}" id="card-${q.id}">
    <div class="q-header" onclick="toggleQuestion('${q.id}')">
      <div class="q-num ${isDone ? 'done' : ''}" id="num-${q.id}">${q.id}</div>
      <div class="q-meta">
        <div class="q-title">${q.title}</div>
        <div class="q-badges">
          <span class="badge ${levelClass}">${levelLabel}</span>
          ${q.ops.map(op => `<span class="badge badge-op">${op}</span>`).join('')}
        </div>
      </div>
      <div class="q-toggle" id="toggle-${q.id}">&#9660;</div>
    </div>
    <div class="q-body" id="body-${q.id}">
      <p class="q-explanation">${q.explanation}</p>
      <div class="code-block">
        <div class="code-header">
          <span class="code-lang">JAVA</span>
          <button class="copy-btn" id="copy-${q.id}" onclick="copyCode('${q.id}')">Copy</button>
        </div>
        <div class="code-content" id="code-${q.id}">${q.code}</div>
      </div>
      <button class="mark-done-btn ${isDone ? 'done' : ''}" id="done-btn-${q.id}" onclick="markDone('${q.id}')">
        ${isDone ? '&#10003; Studied!' : '&#9711; Mark as studied'}
      </button>
    </div>
  </div>`;
}

function setActiveNav(id) {
  document.querySelectorAll('.sidebar-category').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + id);

  main.innerHTML = `
    <div class="section-hero">
      <div class="section-hero-title">${sec.title}</div>
      <div class="section-hero-desc">${sec.desc}</div>
      <div class="section-hero-tags">${sec.tags.map(t => `<span class="hero-tag">${t}</span>`).join('')}</div>
    </div>
    ${domainModelHTML}
    ${filterHTML}
    <div class="questions-grid" id="questions-grid">
      ${renderByLevel(sec.questions, 'all')}
    </div>
  `;
}

function renderByLevel(questions, filter) {
  const levels = ['basic', 'intermediate', 'advanced'];
  let html = '';
  levels.forEach(level => {
    const qs = questions.filter(q => q.level === level && (filter === 'all' || q.level === filter));
    if (qs.length === 0) return;
    if (filter === 'all') {
      const label = { basic: 'Basic', intermediate: 'Intermediate', advanced: 'Advanced' }[level];
      html += `<div class="section-divider"><span class="divider-label">${label}</span><div class="divider-line"></div></div>`;
    }
    html += qs.map(q => renderQuestion(q)).join('');
  });
  return html;
}

function applyFilter(level, sectionName) {
  currentFilter = level;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + level).classList.add('active');
  const sec = sections[sectionName];
  document.getElementById('questions-grid').innerHTML = renderByLevel(sec.questions, level);
}

showSection('home');
updateProgress();
</script>
